<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Search - Freegle Volunteer Wiki</title>
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>
<style>
  body { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 820px; margin: 0 auto; padding: 20px 16px; color: #222; }
  h1 { color: #2d8f3a; font-size: 1.5em; margin: 6px 0 14px; }
  a.home { color: #3AB54A; text-decoration: none; font-size: .95em; }
  :root { --pagefind-ui-primary: #2d8f3a; --pagefind-ui-border: #cfe8cf; --pagefind-ui-border-radius: 8px; }
</style>
</head>
<body>
<p><a class="home" href="/index.php/Main_Page.html">&larr; Freegle Volunteer Wiki</a></p>
<h1>Search the wiki</h1>
<div id="search"></div>
<script>
window.addEventListener('DOMContentLoaded', function () {
  new PagefindUI({ element: '#search', showSubResults: true, showImages: false });
  var p = new URLSearchParams(location.search);
  var q = p.get('search') || p.get('q') || '';
  if (q) {
    var i = document.querySelector('.pagefind-ui__search-input');
    if (i) { i.value = q; i.dispatchEvent(new Event('input', { bubbles: true })); }
  }
});
</script>
</body>
</html>
